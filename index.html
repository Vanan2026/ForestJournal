<script>
var GW=32,GH=24;
var scene,camera,renderer,raycaster,mouse;

var CAMP_BENEFITS=[{damage:1,gather:1,defense:0},{damage:1.1,gather:1.1,defense:1},{damage:1.2,gather:1.2,defense:2},{damage:1.4,gather:1.3,defense:3},{damage:1.6,gather:1.5,defense:5}];
var ROLES={gatherer:{name:'采集者',gather:3,combat:1,build:1,scribe:1,color:0x60aa40},warrior:{name:'战士',gather:1,combat:3,build:1,scribe:1,color:0xaa4040},builder:{name:'建造师',gather:2,combat:2,build:3,scribe:1,color:0xa08040},scribe:{name:'记录者',gather:2,combat:1,build:1,scribe:3,color:0x4080c0}};
var STARTS=[{name:'阿青',role:'gatherer'},{name:'铁柱',role:'warrior'},{name:'木禾',role:'builder'}];
var NAMES=['阿桑','小梅','老莫','柳七','红芽','石三','风九','水仙','阿岚','明夜','云游','白鹿','青萝'];
var agents=[],monsters=[],travelers=[];
var MONSTER_TYPES=[{type:'shadow_wolf',name:'影子狼',hp:15,atk:3,color:0x303040,speed:1.8,drops:['food','wood']},{type:'poison_spider',name:'毒蜘蛛',hp:10,atk:4,color:0x304020,speed:1.4,drops:['food']},{type:'dark_beast',name:'黑雾兽',hp:30,atk:6,color:0x181828,speed:1.2,drops:['food','stone']},{type:'mutant_tree',name:'异变树精',hp:20,atk:4,color:0x1a2810,speed:0.6,drops:['wood','ink']}];
var TRAVELER_TYPES=[{type:'wandering_artist',name:'流浪画家',desc:'走过许多地方，想用画笔记录森林的秘密。',trait:'gather',color:0xc060a0},{type:'lost_scholar',name:'迷途学者',desc:'在古籍中读到过这片森林的传说。',trait:'scribe',color:0x6080c0},{type:'refugee',name:'逃难者',desc:'家园被黑雾吞噬，只想找到新的归宿。',trait:'combat',color:0xa07040},{type:'wandering_merchant',name:'流浪商人',desc:'收购各种奇珍，换取旅途的补给。',trait:'gather',color:0xb08030},{type:'hermit',name:'隐士',desc:'独居多年，已与森林融为一体。',trait:'builder',color:0x408060}];
var grid=[],gridObjects=[];
var nearbyTraveler=null;
function initThree(){scene=new THREE.Scene();scene.background=new THREE.Color(0x0a140a);scene.fog=new THREE.Fog(0x0a140a,22,52);camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);camera.position.set(GW/2,28,GH/2+22);camera.lookAt(GW/2,0,GH/2);renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;scene.add(new THREE.AmbientLight(0x203020,0.7));var sun=new THREE.DirectionalLight(0x90b870,0.9);sun.position.set(15,25,10);sun.castShadow=true;sun.shadow.mapSize.set(2048,2048);sun.shadow.camera.near=0.5;sun.shadow.camera.far=80;sun.shadow.camera.left=-45;sun.shadow.camera.right=45;sun.shadow.camera.top=45;sun.shadow.camera.bottom=-45;scene.add(sun);scene.add(new THREE.DirectionalLight(0x304050,0.35));raycaster=new THREE.Raycaster();mouse=new THREE.Vector2();window.addEventListener('resize',function(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});window.addEventListener('click',onMapClick);buildWorld();animate();}
function buildWorld(){var ground=new THREE.Mesh(new THREE.PlaneGeometry(GW*2,GH*2),new THREE.MeshLambertMaterial({color:0x0e1a0e}));ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;scene.add(ground);for(var x=0;x<=GW;x+=4){var lg=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x,0.01,0),new THREE.Vector3(x,0.01,GH)]);scene.add(new THREE.Line(lg,new THREE.LineBasicMaterial({color:0x162016,transparent:true,opacity:0.4})));}for(var z=0;z<=GH;z+=4){var lg=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0.01,z),new THREE.Vector3(GW,0.01,z)]);scene.add(new THREE.Line(lg,new THREE.LineBasicMaterial({color:0x162016,transparent:true,opacity:0.4})));}var camp=new THREE.Mesh(new THREE.CylinderGeometry(2.5,3.2,1.2,8),new THREE.MeshLambertMaterial({color:0x2a2010}));camp.position.set(GW/2,0.6,GH/2);camp.castShadow=true;camp.userData={type:'camp'};scene.add(camp);gridObjects.push(camp);var fire=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.5,0.3,6),new THREE.MeshBasicMaterial({color:0xff6020}));fire.position.set(GW/2,1.3,GH/2);fire.userData={type:'fire'};scene.add(fire);gridObjects.push(fire);var tent=new THREE.Mesh(new THREE.ConeGeometry(1.2,1.8,4),new THREE.MeshLambertMaterial({color:0x3a2820}));tent.position.set(GW/2-2.5,0.9,GH/2-1);tent.rotation.y=Math.PI/4;tent.castShadow=true;scene.add(tent);gridObjects.push(tent);for(var x=0;x<GW;x++){grid[x]=[];for(var z=0;z<GH;z++){grid[x][z]={type:'grass',object:null,walkable:true,resource:null};var dist=Math.hypot(x-GW/2,z-GH/2);if(dist<4)continue;var r=Math.random();if(r<0.07){var t=makeTree(x,z);scene.add(t);grid[x][z]={type:'tree',walkable:false,resource:{kind:'wood',amount:2+Math.floor(Math.random()*2)}};gridObjects.push(t);}else if(r<0.11){var rk=makeRock(x,z);scene.add(rk);grid[x][z]={type:'rock',walkable:false,resource:{kind:'stone',amount:2+Math.floor(Math.random()*2)}};gridObjects.push(rk);}else if(r<0.15){var b=makeBush(x,z);scene.add(b);grid[x][z]={type:'bush',resource:{kind:'food',amount:2+Math.floor(Math.random()*2)}};gridObjects.push(b);}else if(r<0.17){var p=makeInkPlant(x,z);scene.add(p);grid[x][z]={type:'inkplant',resource:{kind:'ink',amount:1}};gridObjects.push(p);}}}}
function makeTree(x,z){var g=new THREE.Group();var trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.22,1.1,6),new THREE.MeshLambertMaterial({color:0x3a2810}));trunk.position.y=0.55;trunk.castShadow=true;g.add(trunk);var leaves=new THREE.Mesh(new THREE.ConeGeometry(0.9,1.6,6),new THREE.MeshLambertMaterial({color:0x1a4010}));leaves.position.y=1.6;leaves.castShadow=true;g.add(leaves);g.position.set(x,0,z);g.userData={type:'tree',gx:x,gz:z};return g;}
function makeRock(x,z){var g=new THREE.Group();var rk=new THREE.Mesh(new THREE.DodecahedronGeometry(0.55,0),new THREE.MeshLambertMaterial({color:0x505055}));rk.scale.set(1,0.65,1);rk.position.y=0.35;rk.castShadow=true;g.add(rk);g.position.set(x,0,z);g.userData={type:'rock',gx:x,gz:z};return g;}
function makeBush(x,z){var g=new THREE.Group();var bush=new THREE.Mesh(new THREE.SphereGeometry(0.45,6,4),new THREE.MeshLambertMaterial({color:0x304820}));bush.scale.set(1,0.7,1);bush.position.y=0.3;bush.castShadow=true;g.add(bush);var bMat=new THREE.MeshBasicMaterial({color:0xcc3030});for(var i=0;i<4;i++){var b=new THREE.Mesh(new THREE.SphereGeometry(0.08,4,4),bMat);b.position.set((Math.random()-0.5)*0.5,0.4,(Math.random()-0.5)*0.5);g.add(b);}g.position.set(x,0,z);g.userData={type:'bush',gx:x,gz:z};return g;}
function makeInkPlant(x,z){var g=new THREE.Group();var stem=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.06,0.6,4),new THREE.MeshLambertMaterial({color:0x1a1028}));stem.position.y=0.3;g.add(stem);var fl=new THREE.Mesh(new THREE.SphereGeometry(0.15,6,4),new THREE.MeshBasicMaterial({color:0x4020a0}));fl.position.y=0.65;g.add(fl);g.position.set(x,0,z);g.userData={type:'inkplant',gx:x,gz:z};return g;}
function makeAgentMesh(color,scale){scale=scale||0.5;var g=new THREE.Group();var body=new THREE.Mesh(new THREE.CylinderGeometry(0.2*scale,0.25*scale,0.6*scale,6),new THREE.MeshLambertMaterial({color}));body.position.y=0.3*scale;body.castShadow=true;g.add(body);var head=new THREE.Mesh(new THREE.SphereGeometry(0.2*scale,6,4),new THREE.MeshLambertMaterial({color:0xd0a878}));head.position.y=0.75*scale;head.castShadow=true;g.add(head);var eyeMat=new THREE.MeshBasicMaterial({color:0x202020});[-0.08*scale,0.08*scale].forEach(function(ex){var e=new THREE.Mesh(new THREE.SphereGeometry(0.04*scale,4,4),eyeMat);e.position.set(ex,0.8*scale,0.17*scale);g.add(e);});return g;}

function makeMonsterMesh(m){var g=new THREE.Group();var col=m.color||0x303040;if(m.type==='shadow_wolf'){var bMat=new THREE.MeshLambertMaterial({color:col});var body=new THREE.Mesh(new THREE.BoxGeometry(0.8,0.5,1.2),bMat);body.position.y=0.35;body.castShadow=true;g.add(body);var head=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.4,0.5),bMat);head.position.set(0,0.55,0.7);head.castShadow=true;g.add(head);var eyeMat=new THREE.MeshBasicMaterial({color:0xff3030});[-0.15,0.15].forEach(function(ex){var e=new THREE.Mesh(new THREE.SphereGeometry(0.06,4,4),eyeMat);e.position.set(ex,0.65,0.95);g.add(e);});}else if(m.type==='poison_spider'){var bMat=new THREE.MeshLambertMaterial({color:col});var body=new THREE.Mesh(new THREE.SphereGeometry(0.4,6,4),bMat);body.scale.set(1,0.7,1.3);body.position.y=0.3;body.castShadow=true;g.add(body);for(var i=0;i<4;i++){var angle=(i/4)*Math.PI*2;var leg=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,0.7,4),bMat);leg.position.set(Math.cos(angle)*0.4,0.25,Math.sin(angle)*0.4);leg.rotation.z=Math.cos(angle)*0.6;leg.rotation.x=Math.sin(angle)*0.6;g.add(leg);}var e=new THREE.Mesh(new THREE.SphereGeometry(0.08,4,4),new THREE.MeshBasicMaterial({color:0x80ff00}));e.position.set(0,0.42,0.48);g.add(e);}else if(m.type==='dark_beast'){var bMat=new THREE.MeshLambertMaterial({color:col});var body=new THREE.Mesh(new THREE.SphereGeometry(0.7,6,4),bMat);body.scale.set(1,0.8,1.2);body.position.y=0.6;body.castShadow=true;g.add(body);var hornMat=new THREE.MeshLambertMaterial({color:0x302840});for(var s of[-1,1]){var horn=new THREE.Mesh(new THREE.ConeGeometry(0.1,0.4,4),hornMat);horn.position.set(s*0.3,1.0,-0.2);horn.rotation.z=s*0.3;g.add(horn);}var eyeMat=new THREE.MeshBasicMaterial({color:0x8000ff});for(var ex of[-0.25,0.25]){var e=new THREE.Mesh(new THREE.SphereGeometry(0.1,4,4),eyeMat);e.position.set(ex,0.75,0.55);g.add(e);}}else if(m.type==='mutant_tree'){var trunkMat=new THREE.MeshLambertMaterial({color:0x1a1008});var trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.5,1.5,6),trunkMat);trunk.position.y=0.75;trunk.castShadow=true;g.add(trunk);var leavesMat=new THREE.MeshLambertMaterial({color:col});var leaves=new THREE.Mesh(new THREE.SphereGeometry(0.8,6,4),leavesMat);leaves.scale.set(1,1.3,1);leaves.position.y=1.8;leaves.castShadow=true;g.add(leaves);var eyeMat=new THREE.MeshBasicMaterial({color:0xff2020});for(var ex of[-0.2,0.2]){var e=new THREE.Mesh(new THREE.SphereGeometry(0.12,4,4),eyeMat);e.position.set(ex,1.2,0.5);g.add(e);}}return g;}
function makeTravelerMesh(t){var g=makeAgentMesh(t.color,0.55);var q=new THREE.Mesh(new THREE.SphereGeometry(0.15,6,4),new THREE.MeshBasicMaterial({color:0xb0d090}));q.position.y=1.25;q.userData={floating:true};g.add(q);return g;}
function spawnAgents(){STARTS.forEach(function(s,i){var role=ROLES[s.role];var a={id:'agent_'+i,name:s.name,role:s.role,hp:20+role.gather*4,maxHp:20+role.gather*4,energy:80,maxEnergy:100,food:60,maxFood:100,hunger:0,fatigue:0,state:'idle',task:null,taskTarget:null,x:GW/2+(Math.random()-0.5)*4,z:GH/2+(Math.random()-0.5)*4,targetX:null,targetZ:null,mesh:null,atkCooldown:0,moveTimer:0,combatTarget:null,recruited:false,exploreProgress:0};a.mesh=makeAgentMesh(role.color);a.mesh.position.set(a.x,0,a.z);a.mesh.userData={type:'agent',id:a.id};scene.add(a.mesh);agents.push(a);});}
function updateAgentUI(){var el=document.getElementById('pagents');if(!el)return;el.innerHTML='';agents.forEach(function(a){var role=ROLES[a.role];var hpPct=Math.round(a.hp/a.maxHp*100);var ePct=Math.round(a.energy/a.maxEnergy*100);var fPct=Math.round(a.food/a.maxFood*100);var sel=selectedAgent&&selectedAgent.id===a.id;var div=document.createElement('div');div.className='acard'+(sel?' sel':'');div.onclick=function(){selectAgent(a);};var stateClass=a.state==='combat'?'combat':a.state==='resting'?'rest':a.state==='gathering'||a.state==='exploring'||a.state==='building'?'gather':'';div.innerHTML='<div class="aname">'+a.name+'</div><div class="arole">'+role.name+'</div>'+'<div class="aneed"><span>HP</span><div class="ab"><div class="abf" style="width:'+hpPct+'%;background:'+(a.state==='combat'?'#aa4040':'#60aa40')+'"></div></div></div>'+'<div class="aneed"><span>体力</span><div class="ab"><div class="abf" style="width:'+ePct+'%;background:#4080c0"></div></div></div>'+'<div class="aneed"><span>饱腹</span><div class="ab"><div class="abf" style="width:'+fPct+'%;background:#c08030"></div></div></div>'+'<div class="astate '+stateClass+'">'+stateLabel(a)+'</div>';el.appendChild(div);});}
function stateLabel(a){if(a.state==='combat')return'⚔ 战斗';if(a.state==='resting')return'💤 休息';if(a.state==='gathering')return'🌿 采集';if(a.state==='exploring')return'🔍 探索';if(a.state==='building')return'🔨 建造';return'⏸ 待命';}
function selectAgent(a){if(selectedAgent&&selectedAgent.id===a.id){selectedAgent=null;document.getElementById('cmdbar').style.display='none';document.getElementById('ebtn').style.display='none';}else{selectedAgent=a;document.getElementById('cmdbar').style.display='flex';document.getElementById('ebtn').style.display=agents.length<5?'block':'none';}updateAgentUI();}
function cmdGather(){if(!selectedAgent)return;selectedAgent.task='gather';selectedAgent.state='gathering';selectedAgent.combatTarget=null;addEv(selectedAgent.name+'开始采集','gather');document.getElementById('cmdbar').style.display='none';updateAgentUI();}
function cmdExplore(){if(!selectedAgent)return;selectedAgent.task='explore';selectedAgent.state='exploring';selectedAgent.exploreProgress=0;addEv(selectedAgent.name+'开始探索','gather');document.getElementById('cmdbar').style.display='none';updateAgentUI();}
function cmdRest(){if(!selectedAgent)return;selectedAgent.task='rest';selectedAgent.state='resting';selectedAgent.combatTarget=null;addEv(selectedAgent.name+'开始休息','rest');document.getElementById('cmdbar').style.display='none';updateAgentUI();}
function cmdBuild(){if(!selectedAgent)return;if(campLevel>=5){showHint('营地已满级！');return;}var cost=CAMP_COSTS[campLevel+1];if(!canAfford(cost)){showHint('资源不足！');return;}selectedAgent.task='build';selectedAgent.state='building';addEv(selectedAgent.name+'开始建造','gather');document.getElementById('cmdbar').style.display='none';updateAgentUI();}
function cmdCancel(){if(!selectedAgent)return;selectedAgent.task=null;selectedAgent.state='idle';selectedAgent.combatTarget=null;document.getElementById('cmdbar').style.display='none';updateAgentUI();}
function cmdInteract(){if(!selectedAgent||!nearbyTraveler)return;interactWithTraveler(nearbyTraveler);document.getElementById('ebtn').style.display='none';}
function spawnMonster(){var type=MONSTER_TYPES[Math.floor(Math.random()*MONSTER_TYPES.length)];var edge=Math.random()<0.5;var x,z;if(edge){var side=Math.floor(Math.random()*4);if(side===0){x=Math.random()*GW;z=1;}else if(side===1){x=Math.random()*GW;z=GH-1;}else if(side===2){x=1;z=Math.random()*GH;}else{x=GW-1;z=Math.random()*GH;}}else{x=Math.random()*GW;z=Math.random()*GH;}var m={id:'mon_'+Date.now(),type:type.type,name:type.name,hp:type.hp,maxHp:type.hp,atk:type.atk,color:type.color,speed:type.speed,drops:type.drops,x:x,z:z,mesh:null,targetX:null,targetZ:null,state:'wandering',attackTimer:0};m.mesh=makeMonsterMesh(type);m.mesh.position.set(m.x,0,m.z);m.mesh.userData={type:'monster',id:m.id};scene.add(m.mesh);monsters.push(m);addEv('发现'+m.name+'出没！','danger');}
function updateMonsters(dt){monsters.forEach(function(m){if(m.state==='dead')return;var distToCamp=Math.hypot(m.x-GW/2,m.z-GH/2);var nearestAgent=null;var nearestDist=Infinity;agents.forEach(function(a){var d=Math.hypot(m.x-a.x,m.z-a.z);if(d<nearestDist){nearestDist=d;nearestAgent=a;}});var aggroRange=8;if(nearestAgent&&nearestDist<aggroRange){m.state='chasing';m.targetX=nearestAgent.x;m.targetZ=nearestAgent.z;nearestAgent.combatTarget=m;nearestAgent.state='combat';nearestAgent.task=null;}else if(distToCamp<6&&Math.random()<0.01){m.state='attacking_camp';}else{m.state='wandering';if(!m.targetX||Math.random()<0.01){m.targetX=1+Math.random()*(GW-2);m.targetZ=1+Math.random()*(GH-2);}}var spd=m.speed*dt;if(m.targetX!==null){var dx=m.targetX-m.x;var dz=m.targetZ-m.z;var dist=Math.sqrt(dx*dx+dz*dz);if(dist>0.5){m.x+=dx/dist*spd;m.z+=dz/dist*spd;m.mesh.position.set(m.x,0,m.z);}}if(m.state==='attacking_camp'){m.attackTimer+=dt;if(m.attackTimer>2){m.attackTimer=0;resources.food=Math.max(0,resources.food-1);resources.wood=Math.max(0,resources.wood-1);addEv(m.name+'袭击营地！损失资源！','danger');updateUI();}}else if(m.state==='chasing'&&nearestAgent){var d=Math.hypot(m.x-nearestAgent.x,m.z-nearestAgent.z);if(d<1.2){m.attackTimer+=dt;if(m.attackTimer>1.5){m.attackTimer=0;nearestAgent.hp-=m.atk;addEv(nearestAgent.name+'受到'+m.name+'攻击！HP-'+m.atk,'danger');if(nearestAgent.hp<=0){nearestAgent.state='dead';scene.remove(nearestAgent.mesh);addEv(nearestAgent.name+'倒下了...','die');journal(nearestAgent.name+'在第'+dayCount+'天被'+m.name+'杀死。',true);agents=agents.filter(function(aa){return aa.id!==nearestAgent.id;});selectedAgent=null;}}}}});var deadMonsters=monsters.filter(function(m){return m.state==='dead';});deadMonsters.forEach(function(m){scene.remove(m.mesh);monsters=monsters.filter(function(mm){return mm.id!==m.id;});addEv('击败了'+m.name+'！','combat');m.drops.forEach(function(kind){if(kind==='food')resources.food+=2;else if(kind==='wood')resources.wood+=2;else if(kind==='stone')resources.stone+=1;else if(kind==='ink')resources.ink+=1;});updateUI();});}
function findResourceNear(a){var gx=Math.floor(a.x);var gz=Math.floor(a.z);for(var r=1;r<10;r++){for(var dx=-r;dx<=r;dx++){for(var dz=-r;dz<=r;dz++){var nx=gx+dx;var nz=gz+dz;if(nx>=0&&nx<GW&&nz>=0&&nz<GH&&grid[nx]&&grid[nx][nz]&&grid[nx][nz].resource){return{tx:nx,tz:nz};}}}}}return null;}

function updateAgentBehavior(dt){agents.forEach(function(a){if(a.hp<=0)return;if(a.food<10&&a.state!=='combat'&&a.task!=='gather'){a.state='resting';a.task='rest';}if(a.energy<20&&a.state!=='combat'&&a.task!=='gather'&&a.state!=='resting'){a.state='resting';a.task='rest';}if(a.state==='resting'||a.task==='rest'){a.energy=Math.min(a.maxEnergy,a.energy+15*dt);a.food=Math.min(a.maxFood,a.food+5*dt);if(a.energy>=90&&a.food>=50){a.state='idle';a.task=null;addEv(a.name+'恢复体力','rest');}}if(a.combatTarget){var m=a.combatTarget;if(!m||m.state==='dead'){a.combatTarget=null;a.state='idle';return;}var d=Math.hypot(a.x-m.x,a.z-m.z);if(d<1.2){a.atkCooldown-=dt;if(a.atkCooldown<=0){a.atkCooldown=1.5;var role=ROLES[a.role];var dmg=Math.round(role.combat*CAMP_BENEFITS[campLevel].damage);m.hp-=dmg;addEv(a.name+'对'+m.name+'造成'+dmg+'伤害','combat');if(m.hp<=0){m.state='dead';m.mesh.visible=false;a.combatTarget=null;a.state='idle';}}a.mesh.rotation.y+=0.1;}else{var dx=m.x-a.x;var dz=m.z-a.z;var spd=3*dt;var dist=Math.sqrt(dx*dx+dz*dz);if(dist>0){a.x+=dx/dist*spd;a.z+=dz/dist*spd;a.mesh.position.set(a.x,0,a.z);}}}else if(a.state==='gathering'){if(!a.targetX||Math.hypot(a.x-a.targetX,a.z-a.targetZ)<0.5){var f=findResourceNear(a);if(f){a.targetX=f.tx+0.5;a.targetZ=f.tz+0.5;a.taskTarget=f;}else{a.targetX=Math.random()*GW;a.targetZ=Math.random()*GH;}}var dx=a.targetX-a.x;var dz=a.targetZ-a.z;var dist=Math.sqrt(dx*dx+dz*dz);if(dist>0.3){var spd=2*dt;a.x+=dx/dist*spd;a.z+=dz/dist*spd;a.mesh.position.set(a.x,0,a.z);}else if(a.taskTarget){var gx=Math.floor(a.targetX);var gz=Math.floor(a.targetZ);if(grid[gx]&&grid[gx][gz]&&grid[gx][gz].resource){var role=ROLES[a.role];var amount=Math.round(grid[gx][gz].resource.amount*role.gather*CAMP_BENEFITS[campLevel].gather);var kind=grid[gx][gz].resource.kind;if(kind==='food')resources.food+=amount;else if(kind==='wood')resources.wood+=amount;else if(kind==='stone')resources.stone+=amount;else if(kind==='ink')resources.ink+=amount;addEv(a.name+'采集了'+amount+' '+kind,'gather');grid[gx][gz].resource=null;if(gridObjects){gridObjects.forEach(function(obj){if(obj.userData&&obj.userData.gx===gx&&obj.userData.gz===gz){scene.remove(obj);}});}}}a.energy-=5*dt;a.food-=3*dt;}else if(a.state==='exploring'){a.exploreProgress+=dt*0.5;var spd=2.5*dt;if(!a.targetX){a.targetX=GW/2+(Math.random()-0.5)*GW;a.targetZ=GH/2+(Math.random()-0.5)*GH;}var dx=a.targetX-a.x;var dz=a.targetZ-a.z;var dist=Math.sqrt(dx*dx+dz*dz);if(dist>0.3){a.x+=dx/dist*spd;a.z+=dz/dist*spd;a.mesh.position.set(a.x,0,a.z);}else{a.targetX=null;a.targetZ=null;}if(a.exploreProgress>5&&Math.random()<0.3){spawnTraveler();a.exploreProgress=0;}a.energy-=3*dt;a.food-=2*dt;}else if(a.state==='building'){var cost=CAMP_COSTS[campLevel+1];if(cost&&canAfford(cost)){deductResources(cost);campLevel++;addEv('营地升级至 Lv.'+campLevel+'！','gather');updateUI();toggleCamp();}a.state='idle';a.task=null;}else if(a.state==='idle'&&!a.task){a.moveTimer+=dt;if(a.moveTimer>4){a.moveTimer=0;var angle=Math.random()*Math.PI*2;var dist=1+Math.random()*2;a.targetX=Math.max(1,Math.min(GW-1,a.x+Math.cos(angle)*dist));a.targetZ=Math.max(1,Math.min(GH-1,a.z+Math.sin(angle)*dist));}if(a.targetX){var dx=a.targetX-a.x;var dz=a.targetZ-a.z;var dist=Math.sqrt(dx*dx+dz*dz);if(dist>0.2){var spd=1*dt;a.x+=dx/dist*spd;a.z+=dz/dist*spd;a.mesh.position.set(a.x,0,a.z);}else{a.targetX=null;a.targetZ=null;}}}a.energy=Math.max(0,Math.min(a.maxEnergy,a.energy));a.food=Math.max(0,Math.min(a.maxFood,a.food));if(a.food<=0){a.hp-=5*dt;if(a.hp<=0&&a.state!=='dead'){a.state='dead';scene.remove(a.mesh);addEv(a.name+'饥饿而死...','die');journal(a.name+'在第'+dayCount+'天因饥饿去世。',true);agents=agents.filter(function(aa){return aa.id!==a.id;});selectedAgent=null;}}});}
function canAfford(cost){if(!cost)return true;if(cost.food&&resources.food<cost.food)return false;if(cost.wood&&resources.wood<cost.wood)return false;if(cost.stone&&resources.stone<cost.stone)return false;if(cost.ink&&resources.ink<cost.ink)return false;return true;}
function deductResources(cost){if(!cost)return;if(cost.food)resources.food-=cost.food;if(cost.wood)resources.wood-=cost.wood;if(cost.stone)resources.stone-=cost.stone;if(cost.ink)resources.ink-=cost.ink;}
function spawnTraveler(){if(travelers.length>=2)return;var type=TRAVELER_TYPES[Math.floor(Math.random()*TRAVELER_TYPES.length)];var angle=Math.random()*Math.PI*2;var dist=8+Math.random()*6;var x=GW/2+Math.cos(angle)*dist;var z=GH/2+Math.sin(angle)*dist;x=Math.max(1,Math.min(GW-1,x));z=Math.max(1,Math.min(GH-1,z));var t={id:'traveler_'+Date.now(),type:type.type,name:type.name,desc:type.desc,trait:type.trait,color:type.color,x:x,z:z,mesh:null,state:'idle',wanderTimer:0};t.mesh=makeTravelerMesh(type);t.mesh.position.set(t.x,0,t.z);t.mesh.userData={type:'traveler',id:t.id};scene.add(t.mesh);travelers.push(t);addEv('发现旅人：'+t.name,'recruit');}
function updateTravelers(dt){nearbyTraveler=null;travelers.forEach(function(t){if(t.state==='recruited')return;var nearestDist=Infinity;var nearestAgent=null;agents.forEach(function(a){var d=Math.hypot(t.x-a.x,t.z-a.z);if(d<nearestDist){nearestDist=d;nearestAgent=a;}});if(nearestAgent&&nearestDist<2.5){nearbyTraveler=t;if(selectedAgent){document.getElementById('ebtn').style.display=agents.length<5?'block':'none';}}t.wanderTimer+=dt;if(t.wanderTimer>5&&nearestDist>3){t.wanderTimer=0;var angle=Math.random()*Math.PI*2;var dist=1+Math.random()*3;var tx=t.x+Math.cos(angle)*dist;var tz=t.z+Math.sin(angle)*dist;tx=Math.max(1,Math.min(GW-1,tx));tz=Math.max(1,Math.min(GH-1,tz));var dx=tx-t.x;var dz=tz-t.z;var dist2=Math.sqrt(dx*dx+dz*dz);if(dist2>0){t.x+=dx/dist2*1.5*dt;t.z+=dz/dist2*1.5*dt;t.mesh.position.set(t.x,0,t.z);}}});}
function interactWithTraveler(t){if(!t||t.state==='recruited')return;var msg='<b>'+t.name+'</b><br><span style="color:#506850;font-size:10px">'+t.desc+'</span><br><span style="color:#385838;font-size:9px">特长：'+ROLES[t.trait].name+'</span>';showDialog(msg,[{text:'邀请加入',action:function(){recruitTraveler(t);}},{text:'交易',action:function(){tradeWithTraveler(t);}},{text:'离开',action:function(){}}]);}
function recruitTraveler(t){if(agents.length>=5){showHint('队伍已满（5人）！');return;}var role=ROLES[t.trait];var newAgent={id:'agent_'+Date.now(),name:t.name,role:t.trait,hp:15+role.gather*3,maxHp:15+role.gather*3,energy:80,maxEnergy:100,food:50,maxFood:100,hunger:0,fatigue:0,state:'idle',task:null,taskTarget:null,x:t.x,z:t.z,targetX:null,targetZ:null,mesh:null,atkCooldown:0,moveTimer:0,combatTarget:null,recruited:true,exploreProgress:0};newAgent.mesh=makeAgentMesh(role.color);newAgent.mesh.position.set(newAgent.x,0,newAgent.z);newAgent.mesh.userData={type:'agent',id:newAgent.id};scene.add(newAgent.mesh);agents.push(newAgent);scene.remove(t.mesh);travelers=travelers.filter(function(tt){return tt.id!==t.id;});addEv(t.name+'加入了队伍！','recruit');journal('第'+dayCount+'天，'+t.name+'（'+role.name+'）加入了小队。');nearbyTraveler=null;updateUI();updateAgentUI();}
function tradeWithTraveler(t){showDialog('<b>交易</b><br>用资源换取其他物资',[{text:'给1食物换1木材',action:function(){if(resources.food>=1&&resources.wood<50){resources.food-=1;resources.wood+=1;addEv('交易完成：食物-1 木材+1','gather');}else{showHint('资源不足或已满！');}}},{text:'给1木材换1石材',action:function(){if(resources.wood>=1&&resources.stone<30){resources.wood-=1;resources.stone+=1;addEv('交易完成：木材-1 石材+1','gather');}else{showHint('资源不足或已满！');}}},{text:'离开',action:function(){}}]);updateUI();}

function addEv(msg,type){type=type||'normal';var el=document.getElementById('evlog');if(!el)return;var div=document.createElement('div');div.className='ev '+type;div.textContent='['+dayCount+'d] '+msg;el.insertBefore(div,el.firstChild);if(el.children.length>8){el.removeChild(el.lastChild);}evLog.push({day:dayCount,msg:msg,type:type});}
function journal(msg,isDeath){var entry={day:dayCount,msg:msg,isDeath:isDeath};journalEntries.push(entry);resources.ink=Math.max(0,resources.ink-1);updateUI();}
function showDialog(msg,opts){var dm=document.getElementById('dm');var dp=document.getElementById('dp');var dopts=document.getElementById('dopts');dp.innerHTML=msg;dopts.innerHTML='';opts.forEach(function(o){var btn=document.createElement('button');btn.className='dopt';btn.textContent=o.text;btn.onclick=function(){dm.style.display='none';if(o.action)o.action();};dopts.appendChild(btn);});dm.style.display='flex';}
function showHint(msg){var h=document.getElementById('hint');h.textContent=msg;h.style.opacity='1';setTimeout(function(){h.style.opacity='0';},2000);}
function updateUI(){document.getElementById('dsp').textContent=dayCount;document.getElementById('foodsp').textContent=resources.food;document.getElementById('woodsp').textContent=resources.wood;document.getElementById('stonesp').textContent=resources.stone;document.getElementById('inksp').textContent=resources.ink;document.getElementById('campsp').textContent=campLevel;document.getElementById('asp').textContent=agents.length;}
function toggleJournal(){var jo=document.getElementById('jo');if(jo.style.display==='block'){jo.style.display='none';return;}jo.style.display='block';var jl=document.getElementById('jlist');jl.innerHTML='';var byDay={};journalEntries.forEach(function(e){if(!byDay[e.day])byDay[e.day]=[];byDay[e.day].push(e);});Object.keys(byDay).sort(function(a,b){return Number(a)-Number(b);}).forEach(function(day){var dDiv=document.createElement('div');dDiv.className='jday';dDiv.textContent='第'+day+'天';jl.appendChild(dDiv);byDay[day].forEach(function(e){var eDiv=document.createElement('div');eDiv.className='je'+(e.isDeath?' die':'');eDiv.innerHTML=e.msg+'<div class="sp"></div>';jl.appendChild(eDiv);});});}
function toggleCamp(){var cp=document.getElementById('campPanel');if(cp.style.display==='block'){cp.style.display='none';return;}cp.style.display='block';var cl=document.getElementById('campList');cl.innerHTML='';var current=CAMP_BENEFITS[campLevel];var nextCost=CAMP_COSTS[campLevel+1];var item=document.createElement('div');item.className='camp-item';item.innerHTML='<h4>营地等级：'+campLevel+'</h4><p>攻击力：x'+current.damage+' | 采集：x'+current.gather+' | 防御：+'+current.defense+'</p>';if(nextCost){var costStr='升级(Lv.'+(campLevel+1)+')需要：';if(nextCost.wood)costStr+='木材'+nextCost.wood+' ';if(nextCost.stone)costStr+='石材'+nextCost.stone+' ';if(nextCost.food)costStr+='食物'+nextCost.food+' ';if(nextCost.ink)costStr+='墨水'+nextCost.ink+' ';var costDiv=document.createElement('div');costDiv.className='cost';costDiv.textContent=costStr;item.appendChild(costDiv);var btn=document.createElement('button');btn.className='upg';btn.textContent='升级';btn.disabled=!canAfford(nextCost);btn.onclick=function(){if(canAfford(nextCost)){deductResources(nextCost);campLevel++;addEv('营地升级至 Lv.'+campLevel+'！','gather');updateUI();toggleCamp();}};item.appendChild(btn);}cl.appendChild(item);}
function onMapClick(e){if(!gameStarted)return;var rect=renderer.domElement.getBoundingClientRect();mouse.x=((e.clientX-rect.left)/rect.width)*2-1;mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;raycaster.setFromCamera(mouse,camera);var hits=raycaster.intersectObjects(scene.children,true);hits.forEach(function(h){var ud=h.object.userData;if(ud){if(ud.type==='agent'){var ag=agents.find(function(a){return a.id===ud.id;});if(ag){selectAgent(ag);return;}}if(ud.type==='monster'){var m=monsters.find(function(mm){return mm.id===ud.id;});if(m&&selectedAgent){selectedAgent.combatTarget=m;selectedAgent.state='combat';selectedAgent.task=null;addEv(selectedAgent.name+'向'+m.name+'发起攻击！','combat');updateAgentUI();return;}}if(ud.type==='traveler'){var t=travelers.find(function(tt){return tt.id===ud.id;});if(t&&selectedAgent){nearbyTraveler=t;document.getElementById('ebtn').style.display='block';interactWithTraveler(t);return;}}}});}
var lastTime=0;
function animate(time){requestAnimationFrame(animate);if(!gameStarted)return;var dt=Math.min((time-lastTime)/1000,0.1);lastTime=time;if(fastMode)dt*=3;gameTime+=dt;if(gameTime>120){gameTime=0;dayCount++;addEv('第'+dayCount+'天开始','normal');updateUI();spawnMonster();if(dayCount%2===0)spawnTraveler();}updateMonsters(dt);updateAgentBehavior(dt);updateTravelers(dt);updateAgentUI();renderer.render(scene,camera);}
function startGame(fm){fm=fm||false;fastMode=fm;gameStarted=true;document.getElementById('ts').style.opacity='0';setTimeout(function(){document.getElementById('ts').style.display='none';document.getElementById('pn').style.display='block';},1000);spawnAgents();spawnMonster();spawnMonster();spawnTraveler();updateUI();updateAgentUI();addEv('第1天，探索开始...','normal');}
window.onload=initThree;
<\/script>
